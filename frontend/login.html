<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动组卷系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin: 10px 0 5px;
        }
        
        .login-header .version {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: #667eea;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
        
        .footer-text i {
            color: #ff6b6b;
        }
        
        .info-text {
            text-align: center;
            margin-top: 15px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        
        .info-text span {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fa fa-file-text-o"></i>
            <h1>自动组卷系统</h1>
            <div class="version">V3.0</div>
        </div>
        
        <div class="form-group">
            <label for="username"><i class="fa fa-user"></i> 用户名</label>
            <input type="text" id="username" class="form-control" placeholder="请输入用户名">
        </div>
        
        <div class="form-group">
            <label for="password"><i class="fa fa-lock"></i> 密码</label>
            <input type="password" id="password" class="form-control" placeholder="请输入密码">
        </div>
        
        <button id="login-btn" class="login-btn">
            <i class="fa fa-sign-in"></i> 登录
        </button>
        
        <div id="error-message" class="error-message">
            <i class="fa fa-exclamation-circle"></i> 用户名或密码错误
        </div>
                        
        <div class="footer-text">
            <i class="fa fa-heart"></i> 教师专用
        </div>
        <div class="info-text">
             <i class="fa fa-copyright"></i> 2026 Zhou Hao. All rights reserved.
        </div>
    </div>
    
    <script>
        document.getElementById('login-btn').addEventListener('click', async function() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 保存用户信息
                    sessionStorage.setItem('username', result.username);
                    sessionStorage.setItem('role', result.role);
                    window.location.href = '/main';
                } else {
                    document.getElementById('error-message').classList.add('show');
                    setTimeout(() => {
                        document.getElementById('error-message').classList.remove('show');
                    }, 2000);
                }
            } catch (error) {
                console.error('登录失败:', error);
                document.getElementById('error-message').classList.add('show');
                setTimeout(() => {
                    document.getElementById('error-message').classList.remove('show');
                }, 2000);
            }
        });
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });
    </script>
</body>
</html>
